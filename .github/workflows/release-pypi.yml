name: Python Package

on:
  pull_request:
  push:
    branches:
      - '*'
    tags:
      - '*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'macos-latest'
          - 'windows-latest'
          - '3.11'
          - '3.12'

    runs-on: ${{ matrix.os }}
    name: Wheel for ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Python packages
        run: python -m pip install --upgrade build pip

      - name: build wheel
        run: python -m build --wheel

      - name: build sdist
        run: python -m build --sdist
        if: ${{ matrix.os == 'macos-latest' }}

      - name: Store the packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions-${{ matrix.os }}
          path: dist

  linux-build:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    name: Wheel for Linux

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - run: /opt/python/cp310-cp310/bin/python -m venv .venv

      - name: Install Python packages
        run: .venv/bin/python -m pip install --upgrade build pip auditwheel

      - name: build wheel
        run: .venv/bin/python -m build --wheel

      - name: manylinux stuff
        run: |
          .venv/bin/python -m auditwheel repair --plat manylinux_2_28_x86_64 dist/*-linux_x86_64.whl -w dist
          rm dist/*-linux_x86_64.whl

      - name: Store the packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions-linux
          path: dist

  merge-artifacts:
    needs:
      - build
      - linux-build
    runs-on: ubuntu-latest
    steps:
      - name: Merge artifacts
        uses: actions/upload-artifact/merge@v7
        with:
          name: python-package-distributions
          pattern: python-package-distributions-*

  pypi:
    runs-on: 'ubuntu-latest'
    needs:
      - merge-artifacts

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: python-package-distributions-*
          merge-multiple: true

      - name: Publish 📦 to PyPI
        if: ${{ github.ref == 'refs/heads/master' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
