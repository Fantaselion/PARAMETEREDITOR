name: Python Package

on:
  pull_request:
  push:
    branches:
      - '*'
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"

    runs-on: ${{ matrix.os }}
    name: Wheel for ${{ matrix.os }} / Python ${{ matrix.python-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python packages
        run: python -m pip install --upgrade build pip

      - name: Build wheel
        run: python -m build --wheel

      - name: Build sdist
        if: ${{ matrix.os == 'macos-latest' && matrix.python-version == '3.10' }}
        run: python -m build --sdist

      - name: Store the packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist

  linux-build:
    strategy:
      fail-fast: false
      matrix:
        python-tag:
          - cp38-cp38
          - cp39-cp39
          - cp310-cp310
          - cp311-cp311
          - cp312-cp312

    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    name: Wheel for Linux / ${{ matrix.python-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Avoid issues with Git's solution for CVE-2022-24765 breaking setuptools-scm
        run: git config --global --add safe.directory $(pwd)

      - name: Create venv
        run: /opt/python/${{ matrix.python-tag }}/bin/python -m venv .venv

      - name: Install Python packages
        run: .venv/bin/python -m pip install --upgrade build pip auditwheel

      - name: Build wheel
        run: .venv/bin/python -m build --wheel

      - name: Repair wheel
        run: |
          .venv/bin/python -m auditwheel repair --plat manylinux_2_28_x86_64 dist/*-linux_x86_64.whl -w dist
          rm dist/*-linux_x86_64.whl

      - name: Store the packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions-linux-${{ matrix.python-tag }}
          path: dist

  merge-artifacts:
    needs:
      - build
      - linux-build
    runs-on: ubuntu-latest
    steps:
      - name: Merge artifacts
        uses: actions/upload-artifact/merge@v7
        with:
          name: python-package-distributions
          pattern: python-package-distributions-*

  pypi:
    runs-on: ubuntu-latest
    needs:
      - merge-artifacts
    permissions:
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: python-package-distributions-*
          merge-multiple: true

      - name: Publish 📦 to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1